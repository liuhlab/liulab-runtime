name: GHCR cleanup

# Prune stale UNTAGGED versions of the per-env container package, while keeping
# every tagged image (`:<env>` moving tags and `:<env>-<version>` release tags)
# AND the untagged manifests those tags reference — multi-arch children and
# buildx attestation / cosign (Sigstore) referrers.
#
# Those referents are exactly what a naive "delete every untagged version" would
# wrongly remove, breaking a tagged image or stripping its provenance. The
# dataaxiom action is manifest-aware and excludes them automatically, so
# `delete-untagged: true` here means "delete only the orphaned untagged digests
# left behind when a moving `:<env>` tag advanced to a newer build".
#
# Triggers:
#   * weekly schedule    -> real cleanup (runs from the default branch).
#   * workflow_dispatch  -> defaults to a DRY RUN that only lists what it would
#                           delete; untick `dry_run` to actually delete.
#
# Permissions: uses the built-in GITHUB_TOKEN. The package was pushed by this
# repo's docker.yml, so it's linked here and `packages: write` grants delete
# rights. If a run 403s on delete, grant this repo Admin on the package
# (Org -> Packages -> liulab-runtime -> Package settings -> Manage Actions
# access), or pass a classic PAT with `write:packages` + `delete:packages` via
# `with: token: ${{ secrets.<PAT> }}`.

on:
  schedule:
    - cron: '0 6 * * 1'          # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview deletions without removing anything'
        type: boolean
        default: true

concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

permissions:
  packages: write                # delete package versions via GITHUB_TOKEN

jobs:
  cleanup:
    name: Prune untagged GHCR versions
    runs-on: ubuntu-latest
    steps:
      - name: Delete untagged versions (keep tagged + their referents)
        # Pinned to v1.2.2 by commit SHA (no moving ref).
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f
        with:
          packages: liulab-runtime
          owner: ${{ github.repository_owner }}
          delete-untagged: true
          # Grace window: never prune untagged digests younger than a day, so an
          # in-flight publish's freshly pushed blobs aren't removed before their
          # parent index/attestation links them.
          older-than: 1 day
          # After deleting, verify every remaining tagged image still resolves.
          # NB: this only *warns* on a dangling tag -- it does not fail the run.
          # The next step is what turns that into a failure.
          validate: true
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

      # The action's `validate` logs `##[warning]digest <sha> not found on image
      # <tag>` and exits 0, so a broken tag shows up as a green run -- that is
      # how `:latest` sat dangling and unnoticed from 2026-06-30 to 2026-07-15.
      # A tagged index whose children are gone is unpullable AND is excluded
      # from pruning (it's tagged), so it never self-heals: it has to fail loudly.
      #
      # This re-derives the check from the registry rather than grepping the
      # action's log, so it can't silently stop working if that wording changes.
      - name: Fail if any tag is left dangling
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY_OWNER,,}/liulab-runtime"   # ghcr wants lowercase
          accept=(
            -H "Accept: application/vnd.oci.image.index.v1+json"
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json"
            -H "Accept: application/vnd.oci.image.manifest.v1+json"
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json"
          )
          token=$(curl -fsS -u "x:${GH_TOKEN}" \
            "https://ghcr.io/token?scope=repository:${repo}:pull&service=ghcr.io" | jq -r .token)
          auth=(-H "Authorization: Bearer ${token}")

          fail=0
          for tag in $(curl -fsS "${auth[@]}" "https://ghcr.io/v2/${repo}/tags/list" | jq -r '.tags[]'); do
            index=$(curl -fsS "${auth[@]}" "${accept[@]}" \
              "https://ghcr.io/v2/${repo}/manifests/${tag}") || {
                echo "::error::tag ${tag} does not resolve at all"; fail=1; continue; }
            # Single-manifest tags have no .manifests[]; nothing further to check.
            for child in $(jq -r '.manifests[]?.digest // empty' <<<"$index"); do
              code=$(curl -s -o /dev/null -w '%{http_code}' "${auth[@]}" "${accept[@]}" \
                "https://ghcr.io/v2/${repo}/manifests/${child}")
              if [ "$code" = "200" ]; then
                echo "ok       ${tag} -> ${child}"
              else
                echo "::error::dangling tag ${tag}: child ${child} returns ${code} — image is unpullable"
                fail=1
              fi
            done
          done
          # Not `[ $fail -eq 0 ] && echo ...`: under `set -e` a false test as the
          # last statement would exit before `exit $fail` ever runs.
          if [ $fail -eq 0 ]; then echo "all tags resolve"; fi
          exit $fail
