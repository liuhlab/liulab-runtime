name: Docker

# Builds the container image and pushes it to the GitHub Container
# Registry (GHCR) on every version tag.
#
# Tag a release to trigger it, e.g.:
#   git tag 2026.6.26 && git push origin 2026.6.26
#
# Setup (one-off, by a maintainer):
#   Pushing to GHCR uses the built-in GITHUB_TOKEN — no secret to create.
#   The `packages: write` permission below is all it needs. After the
#   first successful push, make the package public if desired:
#   GitHub -> your profile/org -> Packages -> liulab-runtime ->
#   Package settings -> Change visibility.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'      # CalVer, e.g. 2026.6.26
      - 'v[0-9]+.[0-9]+.[0-9]+'     # v-prefixed, e.g. v2026.6.26
  workflow_dispatch:                 # allow manual runs from the Actions tab

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write                    # lets GITHUB_TOKEN push to GHCR

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          # The workspace has no linux-aarch64 platform, so build amd64 only.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
