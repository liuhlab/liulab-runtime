name: Docker

# Builds ONE container image per environment and pushes each to the GitHub
# Container Registry (GHCR) as its own tag: `ghcr.io/<repo>:<env>` (moving) and
# `ghcr.io/<repo>:<env>-<version>` (pinned, on release tags). The set of envs is
# the `docker-environments` list in pyproject.toml — edit it there.
#
# Tag a release to publish pinned images, e.g.:
#   git tag 2026.7.3 && git push origin 2026.7.3
# or run manually from the Actions tab (workflow_dispatch) to refresh the
# moving `:<env>` tags without a release.
#
# Setup (one-off, by a maintainer): pushing to GHCR uses the built-in
# GITHUB_TOKEN — no secret to create. The `packages: write` permission below is
# all it needs. After the first push, make each package public if desired via
# GitHub -> Packages -> Package settings -> Change visibility.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'      # CalVer, e.g. 2026.7.3
      - 'v[0-9]+.[0-9]+.[0-9]+'     # v-prefixed, e.g. v2026.7.3
  workflow_dispatch:                 # allow manual runs from the Actions tab

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write                    # lets GITHUB_TOKEN push to GHCR

jobs:
  # Read the per-env image list from pyproject.toml so the build job can fan
  # out one job per environment.
  matrix:
    name: Resolve env list
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.read.outputs.envs }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, tomllib
          envs = tomllib.load(open("pyproject.toml", "rb"))["tool"]["liulab-runtime"]["docker-environments"]
          print("envs=" + json.dumps(envs))
          PY
      - run: echo "Building images for:${{ steps.read.outputs.envs }}"

  build-and-push:
    name: Build & push ${{ matrix.env }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false               # one env failing must not cancel the others
      matrix:
        env: ${{ fromJSON(needs.matrix.outputs.envs) }}
    steps:
      - uses: actions/checkout@v5

      # The ml-gpu image is ~12 GB; reclaim runner disk before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: false      # keep it quick; the big win is tool-cache/docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=false       # no bare :latest — it's ambiguous per-env
          tags: |
            type=raw,value=${{ matrix.env }}
            type=raw,value=${{ matrix.env }}-${{ github.ref_name }},enable=${{ github.ref_type == 'tag' }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          # The workspace has no linux-aarch64 platform, so build amd64 only.
          platforms: linux/amd64
          build-args: |
            PIXI_ENV=${{ matrix.env }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.env }}
          cache-to: type=gha,mode=max,scope=${{ matrix.env }}
