name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Every pre-commit hook runs a tool from the pixi `default` env
      # (`entry: pixi run -e default …`, language: system), so the runner needs
      # pixi + that env on hand — the bare `pre-commit/action` has no pixi and
      # fails every hook with "Executable `pixi` not found".
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          environments: default
          locked: true
      - name: pre-commit run --all-files
        run: pixi run -- pre-commit run --all-files --show-diff-on-failure --color=always

  docs:
    name: docs build (no deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          environments: docs
          locked: true
      - name: mkdocs build --strict
        run: pixi run -e docs docs-build
