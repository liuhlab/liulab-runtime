# Pre-commit hooks for liulab-runtime.
#
# Install once per clone:  pixi run -- pre-commit install
# Run on all files:        pixi run -- pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Use the ruff that pixi already installs (same binary as `pixi run lint`
  # / `fmt`) instead of letting pre-commit pip-install its own pinned copy —
  # that isolated install is fragile and keeps the version in one place
  # (pyproject's `ruff`). Requires `pixi install` first (dev setup already
  # does). `--force-exclude` makes ruff honour excludes on the passed files.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: pixi run -e default ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: pixi run -e default ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
