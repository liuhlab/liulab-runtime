site_name: liulab-runtime
site_description: Centralized package & environment manager for Liu Lab data analysis.
site_url: https://liuhlab.github.io/liulab-runtime/
repo_url: https://github.com/liuhlab/liulab-runtime
repo_name: liuhlab/liulab-runtime
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

nav:
  - Getting started: index.md
  - Background: background.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
